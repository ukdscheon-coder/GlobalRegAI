# GlobalRegAI Docker Compose

# ============================================================
#  GlobalRegAI — 24/7 Free Local Regulatory AI Stack
#  Services: Ollama · Open WebUI · n8n · Qdrant · SearXNG
#  Works on: Windows (Docker Desktop) & macOS (Docker Desktop)
# ============================================================

networks:
  globalregai:
    driver: bridge

volumes:
  ollama_data:
  openwebui_data:
  n8n_data:
  qdrant_data:
  searxng_data:

services:

  # ── 1. Ollama ── Local LLM Engine ──────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: globalregai-ollama
    restart: unless-stopped
    networks:
      - globalregai
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=2
      - NVIDIA_VISIBLE_DEVICES=void
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 30s
      retries: 10
      start_period: 60s

  # ── 2. Open WebUI ── Chat Interface ────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: globalregai-webui
    restart: unless-stopped
    networks:
      - globalregai
    ports:
      - "3000:8080"
    volumes:
      - openwebui_data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-globalregai-secret-2026}
      - WEBUI_NAME=GlobalRegAI
      - DEFAULT_MODELS=llama3.2:3b
      - WEBUI_AUTH=false
      - RAG_EMBEDDING_ENGINE=ollama
      - RAG_EMBEDDING_MODEL=nomic-embed-text
      - RAG_OLLAMA_BASE_URL=http://ollama:11434
      - ENABLE_RAG_WEB_SEARCH=true
      - RAG_WEB_SEARCH_ENGINE=searxng
      - SEARXNG_QUERY_URL=http://searxng:8080/search?q=<query>&format=json
      - VECTOR_DB=qdrant
      - QDRANT_URI=http://qdrant:6333
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── 3. n8n ── Workflow Automation Engine ───────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: globalregai-n8n
    restart: unless-stopped
    networks:
      - globalregai
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-workflows:/home/node/.n8n/workflows
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-globalregai-n8n-key-2026}
      - N8N_USER_MANAGEMENT_DISABLED=true
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false
      - OLLAMA_BASE_URL=http://ollama:11434
      - QDRANT_URL=http://qdrant:6333
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── 4. Qdrant ── Vector Database (RAG) ─────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: globalregai-qdrant
    restart: unless-stopped
    networks:
      - globalregai
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── 5. SearXNG ── Self-hosted Search Engine ────────────────
  searxng:
    image: searxng/searxng:latest
    container_name: globalregai-searxng
    restart: unless-stopped
    networks:
      - globalregai
    ports:
      - "8080:8080"
    volumes:
      - ./config/searxng:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 5
